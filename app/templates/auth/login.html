{% extends "base.html" %}
{% block title %}Sign in{% endblock %}
{% block css %}<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">{% endblock %}
{% block content %}
<div class="auth-card">
    <h1>Welcome back</h1>
    <p class="muted">Sign in to save and review your games.</p>
    <form method="post" class="auth-form">
        <label>Username<input name="username" required autocomplete="username" autofocus></label>
        <label>Password<input name="password" type="password" required autocomplete="current-password"></label>
        <button class="btn-primary" type="submit">Sign in</button>
    </form>
    <p class="muted small">Don't have an account? <a href="{{ url_for('auth.register') }}">Create one</a></p>
</div>
{% endblock %}
